name: Build and Push Cloud Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type to use for this build"
        required: false
        default: arc
        type: choice
        options:
          - arc
          - github-hosted

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  arc:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runner == 'arc' }}
    uses: ./.github/workflows/arc-runner.yml
    secrets: inherit

  github-hosted:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'github-hosted' }}
    uses: ./.github/workflows/github-runner.yml
    secrets: inherit
