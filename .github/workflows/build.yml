name: Build and Push Theia Cloud Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  determine-tag:
    runs-on: arc-runner-set-eduidec
    outputs:
      base_tag: ${{ steps.set-tag.outputs.base_tag }}
      sha_tag: ${{ steps.set-tag.outputs.sha_tag }}
      cache_tag: ${{ steps.set-tag.outputs.cache_tag }}
      image_repo: ${{ steps.set-tag.outputs.image_repo }}
    steps:
      - name: Checkout for SHA access
        uses: actions/checkout@v4

      - name: Set tags
        id: set-tag
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_REPO="$(echo "${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
            CACHE_TAG="build-cache-pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            # For release events, use the release tag/version
            BASE_TAG="${{ github.event.release.tag_name }}"
            CACHE_TAG="build-cache-release"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            BASE_TAG="latest"
            CACHE_TAG="build-cache"
          else
            # For workflow_dispatch or push on feature branches
            BASE_TAG="${{ github.ref_name }}"
            CACHE_TAG="build-cache"
          fi
          
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${BASE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "cache_tag=${CACHE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

  build-and-push-landing-page:
    needs: determine-tag
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/arc-runner-support
    with:
      docker-file: dockerfiles/landing-page/Dockerfile
      image-name: ${{ needs.determine-tag.outputs.image_repo }}/landing-page
      docker-context: .
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      runner-amd64: "arc-runner-set-eduidec"
      runner-arm64: "arc-runner-set-eduidec-arm64"
      network: host
      registry-mirror: "http://131.159.88.30:30081"
      cache-from: |
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/landing-page:${{ needs.determine-tag.outputs.cache_tag }}
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/landing-page:build-cache
      cache-to: "type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/landing-page:${{ needs.determine-tag.outputs.cache_tag }},mode=max"
    secrets: inherit

  build-and-push-operator:
    needs: determine-tag
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/arc-runner-support
    with:
      docker-file: dockerfiles/operator/Dockerfile
      image-name: ${{ needs.determine-tag.outputs.image_repo }}/operator
      docker-context: .
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      runner-amd64: "arc-runner-set-eduidec"
      runner-arm64: "arc-runner-set-eduidec-arm64"
      network: host
      registry-mirror: "http://131.159.88.30:30081"
      cache-from: |
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/operator:${{ needs.determine-tag.outputs.cache_tag }}
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/operator:build-cache
      cache-to: "type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/operator:${{ needs.determine-tag.outputs.cache_tag }},mode=max"
    secrets:
      docker-secrets: ${{ secrets.SENTRY_AUTH_TOKEN != '' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}

  build-and-push-service:
    needs: determine-tag
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/arc-runner-support
    with:
      docker-file: dockerfiles/service/Dockerfile
      image-name: ${{ needs.determine-tag.outputs.image_repo }}/service
      docker-context: .
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      runner-amd64: "arc-runner-set-eduidec"
      runner-arm64: "arc-runner-set-eduidec-arm64"
      network: host
      registry-mirror: "http://131.159.88.30:30081"
      cache-from: |
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/service:${{ needs.determine-tag.outputs.cache_tag }}
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/service:build-cache
      cache-to: "type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/service:${{ needs.determine-tag.outputs.cache_tag }},mode=max"
    secrets:
      docker-secrets: ${{ secrets.SENTRY_AUTH_TOKEN != '' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}
